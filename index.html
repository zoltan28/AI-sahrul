<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SahRul AI Galeri Video</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
<style>
body {
    font-family: 'Montserrat', sans-serif;
    background: linear-gradient(to right, #4facfe, #00f2fe);
    color: #fff;
    margin: 0;
    padding: 20px;
}
header { text-align: center; margin-bottom: 30px; }
header h1 { font-size: 3rem; text-shadow: 2px 2px 8px rgba(0,0,0,0.3); }
header p { font-size: 1.2rem; text-shadow: 1px 1px 5px rgba(0,0,0,0.3); }

/* Ling animasi */
.ling-container {
    margin: 30px auto;
    width: 250px;
    height: 250px;
    position: relative;
}
.ling-container img {
    width: 100%;
    border-radius: 20px;
    transition: transform 0.1s ease;
    pointer-events: none;
}

/* Video utama featured */
.featured-video {
    width: 100%;
    max-width: 900px;
    margin: 0 auto 20px auto;
    border-radius: 20px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.featured-video:hover { 
    transform: scale(1.02); 
    box-shadow: 0 25px 50px rgba(0,0,0,0.7);
}
#unmuteBtn {
    position:absolute; bottom:15px; right:15px;
    padding:8px 12px; font-size:14px;
    border:none; border-radius:8px;
    background-color:rgba(0,0,0,0.6); color:#fff;
    cursor:pointer; transition:0.3s;
}

/* Galeri video grid */
.video-gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
    margin-bottom: 40px;
}

.video-gallery video {
    width: 100%;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    transition: transform 0.2s ease;
}
.video-gallery video:hover { transform: scale(1.03); }

/* AdSense container */
.ad-container { margin: 30px 0; display: flex; justify-content: center; min-height: 100px; }

/* WhatsApp floating */
.whatsapp-button {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 60px;
    height: 60px;
    background-color: #25D366;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}
.whatsapp-button:hover { transform: scale(1.1); box-shadow: 0 8px 25px rgba(0,0,0,0.4); }
.whatsapp-button img { width: 30px; }

footer { text-align: center; margin-top: 50px; opacity: 0.8; }
</style>
</head>
<body>

<header>
<h1>SahRul AI Galeri Video</h1>
<p>Upload video baru + thumbnail, website otomatis menampilkan semua video!</p>
</header>

<!-- AdSense atas header -->
<div class="ad-container">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1087445671304236" crossorigin="anonymous"></script>
<ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-1087445671304236" data-ad-slot="4169370015" data-ad-format="auto" data-full-width-responsive="true"></ins>
<script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>

<!-- Ling animasi mengikuti cursor -->
<div class="ling-container">
    <a href="https://wa.me/6285736147554" target="_blank">
        <img src="https://i.ibb.co/39SnSWwT/file-00000000baa8720bbda60356398de6cc-1.jpg" alt="Ling Character" id="ling">
    </a>
</div>

<!-- Video utama featured -->
<div id="featuredContainer" style="text-align:center; margin-bottom:40px; position:relative;">
    <video id="featuredVideo" class="featured-video" muted playsinline controls autoplay></video>
    <button id="unmuteBtn">Unmute</button>
</div>

<!-- Galeri video otomatis -->
<div class="video-gallery" id="videoGallery"></div>

<!-- AdSense bawah galeri -->
<div class="ad-container">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1087445671304236" crossorigin="anonymous"></script>
<ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-1087445671304236" data-ad-slot="4169370015" data-ad-format="auto" data-full-width-responsive="true"></ins>
<script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>

<!-- Floating WhatsApp -->
<a href="https://wa.me/6285736147554" target="_blank" class="whatsapp-button">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
</a>

<footer>&copy; 2026 SahRul AI. All rights reserved.</footer>

<script>
// Ling mengikuti cursor
const ling = document.getElementById('ling');
document.addEventListener('mousemove', e => {
    const x = (e.clientX - window.innerWidth / 2) / 20;
    const y = (e.clientY - window.innerHeight / 2) / 20;
    ling.style.transform = `translate(${x}px, ${y}px)`;
});

// Galeri otomatis dari videos.json
const videoGallery = document.getElementById('videoGallery');
const featuredVideo = document.getElementById('featuredVideo');
const unmuteBtn = document.getElementById('unmuteBtn');

fetch('https://zoltan28.github.io/AI-sahrul/videos.json')
.then(res => res.json())
.then(videos => {
    if(videos.length > 0){
        // Featured video
        featuredVideo.src = videos[0].src;
        featuredVideo.poster = videos[0].poster || '';
        featuredVideo.play(); // autoplay muted

        // Unmute button
        unmuteBtn.addEventListener('click', () => {
            featuredVideo.muted = false;
            featuredVideo.play();
            unmuteBtn.style.display = 'none';
        });
    }

    // Masukkan semua video ke grid (kecuali featured)
    videos.slice(1).forEach(v => {
        const videoEl = document.createElement('video');
        videoEl.src = v.src;
        videoEl.poster = v.poster || '';
        videoEl.muted = true;
        videoEl.playsInline = true;
        videoEl.controls = true;
        videoGallery.appendChild(videoEl);

        // autoplay saat scroll
        const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => {
                if(entry.isIntersecting){ videoEl.play(); }
                else { videoEl.pause(); }
            });
        }, {threshold:0.5});
        observer.observe(videoEl);
    });
})
.catch(err => console.error('Gagal memuat video JSON:', err));

// AdSense muncul dinamis saat scroll
const ads = document.querySelectorAll('.ad-container');
ads.forEach(ad => {
    const adObserver = new IntersectionObserver(entries => {
        entries.forEach(entry => {
            if(entry.isIntersecting){
                (adsbygoogle = window.adsbygoogle || []).push({});
            }
        });
    }, {threshold:0.5});
    adObserver.observe(ad);
});
</script>

</body>
</html>
