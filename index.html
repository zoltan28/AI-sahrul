<!DOCTYPE html>
<html>
<head>
<title>Akses Premium</title>
</head>
<body>
<h1>Scan & Bayar</h1>
<img src="qris.png">
<br>
<input type="text" id="nomor" placeholder="Masukkan WA">
<button onclick="getKode()">Dapatkan Kode</button>
<p id="info"></p>

<script>
async function getKode() {
  const nomor = document.getElementById("nomor").value;
  const res = await fetch("https://backend-sahrul-production.up.railway.app/generate-code", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ nomor })
  });
  const data = await res.json();
  document.getElementById("info").innerText = data.success ? "Kode dikirim!" : "Error!";
}
</script>
</body>
</html>
