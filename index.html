<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Profesional Ling</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        header { text-align: center; margin-bottom: 20px; }
        header h1 { font-size: 3rem; margin-bottom: 10px; text-shadow: 2px 2px 8px rgba(0,0,0,0.3); }
        header p { font-size: 1.2rem; text-shadow: 1px 1px 5px rgba(0,0,0,0.3); }

        .ling-container { margin: 30px 0; }
        .ling-container img {
            width: 250px;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border-radius: 20px;
        }
        .ling-container img:hover {
            transform: scale(1.1) rotate(5deg);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .whatsapp-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background-color: #25D366;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .whatsapp-button:hover { transform: scale(1.1); box-shadow: 0 8px 25px rgba(0,0,0,0.4); }
        .whatsapp-button img { width: 30px; }

        .ad-container { margin: 20px 0; display: flex; justify-content: center; }
        footer { margin-top: 50px; font-size: 0.9rem; opacity: 0.8; }
    </style>
</head>
<body>

    <header>
        <h1>Selamat Datang di Website SahRul AI</h1>
        <p>Klik gambar  untuk masuk group langsung di WhatsApp gratis!</p>
    </header>

    <!-- AdSense Banner -->
    <div class="ad-container">
        <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1087445671304236"
             crossorigin="anonymous"></script>
        <!-- Sahrul -->
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-1087445671304236"
             data-ad-slot="4169370015"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>
             (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
    </div>

    <div class="ling-container">
        <a href="https://wa.me/6285736147554" target="_blank">
            <img src="https://ibb.co.com/B5T9Tjmf" alt="Ling Character">
        </a>
    </div>

    <!-- Floating WhatsApp Button -->
    <a href="https://wa.me/6285736147554" target="_blank" class="whatsapp-button">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
    </a>

    <footer>
        &copy; 2026 Ling Website. All rights reserved.
    </footer>

</body>
</html>
