<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sahrul Official</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      text-align: center;
    }

    header {
      padding: 20px;
      font-size: 20px;
      font-weight: bold;
    }

    .hero {
      padding: 80px 20px;
    }

    .hero h1 {
      font-size: 40px;
      margin-bottom: 15px;
    }

    .hero p {
      opacity: 0.8;
      margin-bottom: 25px;
    }

    .btn {
      display: inline-block;
      padding: 12px 25px;
      background: #22c55e;
      color: white;
      border-radius: 30px;
      text-decoration: none;
      transition: 0.3s;
    }

    .btn:hover {
      background: #16a34a;
      transform: scale(1.05);
    }

    .section {
      padding: 50px 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      margin: 15px;
      padding: 20px;
      border-radius: 15px;
      display: inline-block;
      width: 250px;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-10px);
      background: rgba(255,255,255,0.1);
    }

    footer {
      margin-top: 40px;
      padding: 20px;
      font-size: 14px;
      opacity: 0.6;
    }
  </style>
</head>

<body>

<header>
  🚀 Sahrul Official
</header>

<section class="hero">
  <h1>Website Keren & Profesional</h1>
  <p>Buat pengunjung tertarik dan klik link kamu 🔥</p>
  
  <!-- GANTI LINK INI -->
  <a href="https://google.com" class="btn">Klik Disini</a>
</section>

<section class="section">
  <h2>Kenapa Harus Disini?</h2>

  <div class="card">
    <h3>🔥 Cepat</h3>
    <p>Website ringan & cepat dibuka</p>
  </div>

  <div class="card">
    <h3>💰 Menghasilkan</h3>
    <p>Bisa untuk promosi & cuan</p>
  </div>

  <div class="card">
    <h3>🎯 Menarik</h3>
    <p>Desain modern bikin betah</p>
  </div>
</section>

<footer>
  © 2026 Sahrul - All Rights Reserved
</footer>

</body>
</html>
