<script>
function cekKode() {
  let kode = document.getElementById("kode").value;

  if(kode === "VIP2026" || kode === "SAHRUL999") {
    localStorage.setItem("akses", "true");
    window.location.href = "https://opal.google/edit/1wuXkQDE_gPxDu6hQ3B0HKfastyudW4BU"; // 🔥 GANTI LINK ASLI
  } else {
    alert("❌ Kode salah atau belum bayar!");
  }
}

window.onload = function() {
  if(localStorage.getItem("akses") === "true") {
    window.location.href = "https://opal.google/edit/1wuXkQDE_gPxDu6hQ3B0HKfastyudW4BU"; // 🔥 GANTI LINK ASLI
  }
}

let time = 300;
setInterval(()=>{
  let m = Math.floor(time/60);
  let s = time%60;
  document.getElementById("timer").innerText =
    "Promo berakhir dalam: " + m + ":" + (s<10?"0":"") + s;
  time--;
},1000);
</script>
