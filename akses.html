<!DOCTYPE html>
<html>
<body>
<h1>Akses Premium</h1>
<input type="text" id="kode" placeholder="Masukkan Kode">
<button onclick="cek()">Buka</button>

<script>
async function cek() {
  const k = document.getElementById("kode").value;
  const res = await fetch(`https://backend-sahrul-production.up.railway.app/verify?kode=${k}`);
  const data = await res.json();
  if (data.success) window.location.href = data.redirect;
  else alert("Kode salah!");
}
</script>
</body>
</html>
